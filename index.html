<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
            <div class="container-fluid">
              <a class="navbar-brand" id="navbar-brand" href="https://www.instagram.com/fitnesswithlou/" target="_blank" rel="noopener noreferrer">  
                <img class="" width="100" height="120"  src="assets/images/logo2.png" alt="">
 
              </a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>

    <main>
      <div class="container">
        <h1>Book your class here!</h1>
            <div class="row mt-5">
                <div class="col-12">

                    <form id="booking-form" method="POST">
                    <div class="mb-3 rounded">
                        <label for="first-name" class="form-label">First name<span class="important">*</span> </label>
                        <input type="text" class="form-control" id="first-name" placeholder="" required>
                      </div>

                      <div class="mb-3">
                        <label for="last-name" class="form-label">Last name <span class="important">*</span> </label>
                        <input type="text" class="form-control" id="last-name" placeholder="" required>
                      </div>



                    <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Email address <span class="important">*</span> </label>
                        <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com" required>
                      </div>

                      <div class="mb-4">
                        <label for="mobile" class="form-label">Mobile <span class="important">*</span> </label>
                        <input type="tel" class="form-control" id="mobile" placeholder="">
                      </div>


                      <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label">Please list any injuries or medical conditions!</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                      </div>

                      <button type="submit" class="btn btn-book w-100">
                        Continue to Classes & Payment
                    </button>

                    </form>


                </div>
            </div>
        </div>
    </main>


    <footer class="mt-5">
      <div class="container-fluid">
          <div class="row g-0">
              <div class="col-12">
                  <h2 class="feature-pink mb-3 ms-start">DO IT FOR YOURSELF!</h2>
              </div>
          </div>


<div class="row g-0">

                  <h5>Contact</h5>
                  <span class="feature-pink">07458968253</span>
                  <span>fitnesswithlouise@gmail.com</span>
              </div>

              <div class="col-12 col-md-4 text-center">
                  <h5>Location</h5>
                 <span>76 Parkhurst Road, N7 0FF</span>
              </div>

              <div class="col-12 col-md-4 text-center">
                  <h5>Instagram</h5>

                  <a href="https://www.instagram.com/fitnesswithlou/" target="_blank" rel="noopener noreferrer"">
                              <i class=" fa-brands fa-instagram feature-pink"></i>
                  </a>

              </div>



          </div>

      </div>
      </div>
